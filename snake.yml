name: Generate Snake

on:
  schedule:
    # Runs every 12 hours — updates the snake with your latest contributions
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Rinat5x30
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-green.svg?color_snake=#39FF14&color_dots=#0D1117,#0E4429,#006D32,#26A641,#39D353
            dist/github-snake-cyan.svg?color_snake=#00D9FF&color_dots=#0D1117,#0a3d4f,#136d8c,#1c9dca,#26d3ff

      - name: Push generated SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
